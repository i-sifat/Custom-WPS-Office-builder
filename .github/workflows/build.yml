name: Build WPS Office (Custom)

# End-to-end pipeline, orchestrated entirely in CI:
#   download.sh  -> download upstream .deb + extract into ./build   (only kept script)
#   Clean step   -> strip non-English locales + telemetry/online per CLEANING_MAP.md
#   Repack step  -> rebuild ./output/<pkg>_<ver>_amd64.deb
#   Release step -> publish the built .deb
#
# download.sh is the ONLY shell script in the repo and owns the upstream URL.
# The old build.sh / clean.sh / cleaner.sh / repack.sh wrappers were folded in here.

on:
  # Manual runs from the Actions tab.
  workflow_dispatch:
    inputs:
      release:
        description: "Publish a GitHub Release with the built .deb"
        type: boolean
        default: true
  # Tag pushes (e.g. v1.0.0) always build AND release under that tag.
  push:
    tags:
      - "v*"

# Needed for gh release create / uploading assets with the built-in token.
permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev binutils wget ca-certificates xz-utils

      - name: Make download script executable
        run: chmod +x ./download.sh

      # 1) Download the upstream .deb and extract it into ./build (URL lives in download.sh).
      - name: Download & extract WPS Office
        run: ./download.sh

      # 2) Clean: English-only, fully offline. Implements CLEANING_MAP.md.
      #    Only ever deletes paths inside build/. Keeps mui/default, mui/en_US,
      #    English spellcheck dicts and the base auth libs (never deleted).
      - name: Clean (English-only, offline)
        env:
          REMOVE_CJK_DATA: "1"
        run: |
          set -euo pipefail
          BUILD_DIR="build"
          WPS_DIR="$BUILD_DIR/opt/kingsoft/wps-office"
          OFFICE6="$WPS_DIR/office6"
          ADDONS="$OFFICE6/addons"

          [[ -d "$WPS_DIR" ]] || { echo "::error::$WPS_DIR not found - is this really the WPS package?"; exit 1; }
          [[ -f "$BUILD_DIR/DEBIAN/control" ]] || { echo "::error::missing $BUILD_DIR/DEBIAN/control"; exit 1; }

          size_before=$(du -sh "$BUILD_DIR" | awk '{print $1}')
          echo "Size before clean: $size_before"

          # Safe recursive delete restricted to the build tree.
          remove_path() {
            local target="$1"
            case "$target" in
              "$BUILD_DIR"/*) : ;;
              *) echo "  ! SKIP (refusing path outside $BUILD_DIR/): $target"; return 0 ;;
            esac
            if [[ -e "$target" ]]; then
              rm -rf -- "$target"
              echo "  x removed: $target"
            else
              echo "  . not present: $target"
            fi
          }

          echo "[A] Removing non-English language resources..."
          # A1. Every mui/<locale> dir except default + en_US, wherever it appears.
          find "$WPS_DIR" -type d -name mui -print0 | while IFS= read -r -d '' muiparent; do
            for sub in "$muiparent"/*/; do
              [[ -d "$sub" ]] || continue
              base="$(basename "$sub")"
              case "$base" in
                default|en_US) echo "  keep: ${sub%/}" ;;
                *)             remove_path "${sub%/}" ;;
              esac
            done
          done
          # A2. Non-English Qt translations and string bundles.
          for loc in zh_CN zh_TW ja_JP ko_KR de_DE es_ES fr_FR pt_BR pt_PT ru_RU mn_CN ug_CN; do
            while IFS= read -r -d '' f; do
              remove_path "$f"
            done < <(find "$OFFICE6" -type f \( -name "*${loc}*.qm" -o -name "*${loc}*.properties" \) -print0 2>/dev/null)
          done
          # A3. CEF locale packs - keep only en-US.pak.
          if [[ -d "$ADDONS/cef/locales" ]]; then
            while IFS= read -r -d '' f; do
              remove_path "$f"
            done < <(find "$ADDONS/cef/locales" -type f -name "*.pak" ! -name "en-US.pak" -print0 2>/dev/null)
          fi
          # A4. Chinese-only segmentation data (VERIFY-FIRST in the map; gated by REMOVE_CJK_DATA).
          if [[ "${REMOVE_CJK_DATA:-1}" == "1" ]]; then
            remove_path "$OFFICE6/data/chinesesegment"
          else
            echo "  . skipped (REMOVE_CJK_DATA=0): $OFFICE6/data/chinesesegment"
          fi
          # A5. Assert English spellcheck dictionaries survive.
          for d in "$OFFICE6/dicts/spellcheck/en_US" "$OFFICE6/dicts/spellcheck/en_CH"; do
            [[ -d "$d" ]] && echo "  keep (spellcheck): $d"
          done

          echo "[B] Removing telemetry / push components..."
          for a in kfeedback kfeedbackcmds cloudpushsdk messagepush secanalyze; do
            remove_path "$ADDONS/$a"
          done
          remove_path "$OFFICE6/updateself"
          remove_path "$OFFICE6/wpscloudsvr"
          # DEBIAN/postinst is intentionally kept - hand-edit it to strip update/telemetry
          # while preserving mime/desktop registration.
          [[ -f "$BUILD_DIR/DEBIAN/postinst" ]] && echo "  ! VERIFY-FIRST: kept $BUILD_DIR/DEBIAN/postinst"

          echo "[C] Removing online-only add-ons (cloud/account/web + embedded browser)..."
          for a in \
            qing officespace wpsbox kweibo shareplay \
            kclouddocs kusercenter knewshare kqingdlg \
            konlinefileconfig kwebextensionlist linkeddatatype \
            kpromeaccountpanel kpromebrowser kpromeprocesson kpromewebapp kpromeworkarea \
            cef kcef jsapi kjsapipage; do
            remove_path "$ADDONS/$a"
          done
          # KEEP base auth libs - disable via config, never delete.
          for lib in libauth.so libkqingaccountsdk.so libqingipc.so; do
            hit=$(find "$OFFICE6" -name "$lib" -print -quit 2>/dev/null || true)
            [[ -n "$hit" ]] && echo "  keep (auth, do NOT delete): $hit"
          done

          echo "[D] Writing /etc/hosts-style advisory blocklist fragment..."
          mkdir -p "$BUILD_DIR/etc"
          cat > "$BUILD_DIR/etc/hosts.wps-block" << 'HOSTS'
# WPS / Kingsoft blocklist - append to /etc/hosts to hard-block online services.
# Best source of truth for exact endpoints: office6/cfgs/domain_qing.cfg
127.0.0.1  wps.com
127.0.0.1  www.wps.com
127.0.0.1  account.wps.com
127.0.0.1  accounts.wps.com
127.0.0.1  drive.wps.com
127.0.0.1  cloud.wps.com
127.0.0.1  vip.wps.com
127.0.0.1  vipapi.wps.com
127.0.0.1  update.wps.com
127.0.0.1  updatecdn.wps.com
127.0.0.1  push.wps.cn
127.0.0.1  mseb.wps.cn
127.0.0.1  ksointeng.wps.cn
127.0.0.1  ksocdn.wps.cn
127.0.0.1  data.wps.cn
127.0.0.1  counter.kingsoft.net.cn
127.0.0.1  kfuc.wps.cn
127.0.0.1  weiboopen.wps.cn
127.0.0.1  shareplay.wps.cn
127.0.0.1  docs.wps.cn
127.0.0.1  kdocs.cn
HOSTS
          echo "  -> wrote $BUILD_DIR/etc/hosts.wps-block"

          size_after=$(du -sh "$BUILD_DIR" | awk '{print $1}')
          echo "Clean complete. Size before: $size_before  ->  after: $size_after"

      # 3) Repack the cleaned tree into ./output/<pkg>_<ver>_amd64.deb.
      - name: Repack .deb
        id: pkg
        run: |
          set -euo pipefail
          BUILD_DIR="build"
          OUTPUT_DIR="output"

          [[ -f "$BUILD_DIR/DEBIAN/control" ]] || { echo "::error::missing control file"; exit 1; }

          orig_version=$(grep "^Version:" "$BUILD_DIR/DEBIAN/control" | sed 's/^Version: //')
          orig_package=$(grep "^Package:" "$BUILD_DIR/DEBIAN/control" | sed 's/^Package: //')
          orig_arch=$(grep "^Architecture:" "$BUILD_DIR/DEBIAN/control" | sed 's/^Architecture: //' || true)

          [[ -n "$orig_version" ]] || { echo "::error::could not read Version"; exit 1; }
          [[ -n "$orig_package" ]] || { echo "::error::could not read Package"; exit 1; }

          # Idempotent custom suffixes.
          base_package="${orig_package%-custom}"
          base_version="${orig_version%+custom}"
          new_package="${base_package}-custom"
          new_version="${base_version}+custom"

          sed -i "s/^Package: .*/Package: ${new_package}/" "$BUILD_DIR/DEBIAN/control"
          sed -i "s/^Version: .*/Version: ${new_version}/" "$BUILD_DIR/DEBIAN/control"

          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"
          output_deb="$OUTPUT_DIR/${new_package}_${new_version}_${orig_arch:-amd64}.deb"

          dpkg-deb --build "$BUILD_DIR" "$output_deb"
          dpkg-deb -I "$output_deb" >/dev/null || { echo "::error::built package failed integrity check"; exit 1; }

          echo "path=$output_deb" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$output_deb")" >> "$GITHUB_OUTPUT"
          echo "Built: $output_deb"
          ls -lh "$OUTPUT_DIR/"

      # Always keep the build as a downloadable artifact, even when we don't cut a release.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wps-office-custom-deb
          path: output/*.deb
          if-no-files-found: error

      - name: Determine release tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=build-$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"
          fi

      # Release on any tag push, or on a manual run with release=true.
      - name: Create GitHub Release
        if: github.ref_type == 'tag' || inputs.release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.tag.outputs.tag }}" \
            output/*.deb \
            --repo "${{ github.repository }}" \
            --title "WPS Office Custom (${{ steps.tag.outputs.tag }})" \
            --notes "English-only, offline custom build of WPS Office. Telemetry, auto-update and cloud/online components removed per CLEANING_MAP.md."
