name: Build WPS Office (Custom)

# End-to-end pipeline, driven by CI:
#   download.sh  -> download upstream .deb + extract into ./build
#   clean.sh     -> strip non-English locales + telemetry/online per CLEANING_MAP.md
#   Repack step  -> rebuild ./output/<pkg>_<ver>_amd64.deb
#   Release step -> publish the built .deb
#
# The two shell scripts own the logic:
#   * download.sh owns the upstream URL (download + extract).
#   * clean.sh    is the executable 1:1 implementation of CLEANING_MAP.md.
# CLEANING_MAP.md is documentation only. This workflow just wires them together.

on:
  # Manual runs from the Actions tab.
  workflow_dispatch:
    inputs:
      release:
        description: "Publish a GitHub Release with the built .deb"
        type: boolean
        default: true
  # Tag pushes (e.g. v1.0.0) always build AND release under that tag.
  push:
    tags:
      - "v*"

# Needed for gh release create / uploading assets with the built-in token.
permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev binutils wget ca-certificates xz-utils

      - name: Make scripts executable
        run: chmod +x ./download.sh ./clean.sh

      # 1) Download the upstream .deb and extract it into ./build (URL lives in download.sh).
      - name: Download & extract WPS Office
        run: ./download.sh

      # 2) Clean: English-only, fully offline. Implements CLEANING_MAP.md.
      - name: Clean (English-only, offline)
        env:
          REMOVE_CJK_DATA: "1"
        run: ./clean.sh

      # 3) Repack the cleaned tree into ./output/<pkg>_<ver>_amd64.deb.
      - name: Repack .deb
        id: pkg
        run: |
          set -euo pipefail
          BUILD_DIR="build"
          OUTPUT_DIR="output"

          [[ -f "$BUILD_DIR/DEBIAN/control" ]] || { echo "::error::missing control file"; exit 1; }

          orig_version=$(grep "^Version:" "$BUILD_DIR/DEBIAN/control" | sed 's/^Version: //')
          orig_package=$(grep "^Package:" "$BUILD_DIR/DEBIAN/control" | sed 's/^Package: //')
          orig_arch=$(grep "^Architecture:" "$BUILD_DIR/DEBIAN/control" | sed 's/^Architecture: //' || true)

          [[ -n "$orig_version" ]] || { echo "::error::could not read Version"; exit 1; }
          [[ -n "$orig_package" ]] || { echo "::error::could not read Package"; exit 1; }

          # Idempotent custom suffixes.
          base_package="${orig_package%-custom}"
          base_version="${orig_version%+custom}"
          new_package="${base_package}-custom"
          new_version="${base_version}+custom"

          sed -i "s/^Package: .*/Package: ${new_package}/" "$BUILD_DIR/DEBIAN/control"
          sed -i "s/^Version: .*/Version: ${new_version}/" "$BUILD_DIR/DEBIAN/control"

          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"
          output_deb="$OUTPUT_DIR/${new_package}_${new_version}_${orig_arch:-amd64}.deb"

          dpkg-deb --build "$BUILD_DIR" "$output_deb"
          dpkg-deb -I "$output_deb" >/dev/null || { echo "::error::built package failed integrity check"; exit 1; }

          echo "path=$output_deb" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$output_deb")" >> "$GITHUB_OUTPUT"
          echo "Built: $output_deb"
          ls -lh "$OUTPUT_DIR/"

      # Always keep the build as a downloadable artifact, even when we don't cut a release.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wps-office-custom-deb
          path: output/*.deb
          if-no-files-found: error

      - name: Determine release tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=build-$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"
          fi

      # Release on any tag push, or on a manual run with release=true.
      - name: Create GitHub Release
        if: github.ref_type == 'tag' || inputs.release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.tag.outputs.tag }}" \
            output/*.deb \
            --repo "${{ github.repository }}" \
            --title "WPS Office Custom (${{ steps.tag.outputs.tag }})" \
            --notes "English-only, offline custom build of WPS Office. Telemetry, auto-update and cloud/online components removed per CLEANING_MAP.md."
