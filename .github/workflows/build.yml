name: Build WPS Office (Custom)

# End-to-end pipeline, driven by CI. Produces TWO .deb files from one upstream
# download:
#   * wps-office-custom       -> full build  (KEEP_CEF=1): keeps the embedded
#                                browser (CEF), modern web home page, no
#                                "core support library" popup.
#   * wps-office-custom-lite  -> lite build  (KEEP_CEF=0): CEF removed, lean,
#                                classic UI, web home/templates/account panels
#                                gone; fusion loader neutralized so no popup.
#
# Both builds have telemetry/online addons removed and the Section D network
# blocklist applied (privacy is independent of CEF), and both bundle the repo's
# fonts/ directory.
#
# Logic lives in the shell scripts:
#   * download.sh owns the upstream URL (download + extract).
#   * clean.sh    is the executable 1:1 implementation of CLEANING_MAP.md and
#                 takes KEEP_CEF / BUNDLE_FONTS / REMOVE_CJK_DATA via env.

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Publish a GitHub Release with the built .deb files"
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev binutils wget ca-certificates xz-utils gcc

      - name: Make scripts executable
        run: chmod +x ./download.sh ./clean.sh

      # Download the upstream .deb once (URL lives in download.sh). Each variant
      # re-extracts a fresh tree from this cached download.
      - name: Download upstream WPS Office (.deb)
        run: ./download.sh --download

      - name: Build both variants (full = keep CEF / modern UI, lite = no CEF / classic UI)
        run: |
          set -euo pipefail
          rm -rf output && mkdir -p output

          build_variant() {
            variant="$1"; keep_cef="$2"; pkg_suffix="$3"; conflicts="$4"

            echo "::group::[$variant] Extract fresh tree"
            ./download.sh --extract
            echo "::endgroup::"

            echo "::group::[$variant] Clean (KEEP_CEF=$keep_cef)"
            REMOVE_CJK_DATA=1 KEEP_CEF="$keep_cef" BUNDLE_FONTS=1 ./clean.sh
            echo "::endgroup::"

            BUILD_DIR=build
            [ -f "$BUILD_DIR/DEBIAN/control" ] || { echo "::error::missing control file"; exit 1; }

            orig_version=$(grep '^Version:' "$BUILD_DIR/DEBIAN/control" | sed 's/^Version: //')
            orig_arch=$(grep '^Architecture:' "$BUILD_DIR/DEBIAN/control" | sed 's/^Architecture: //' || true)
            [ -n "$orig_version" ] || { echo "::error::could not read Version"; exit 1; }

            base_version="${orig_version%%+*}"
            new_package="wps-office-${pkg_suffix}"
            new_version="${base_version}+${pkg_suffix}"

            sed -i "s/^Package: .*/Package: ${new_package}/" "$BUILD_DIR/DEBIAN/control"
            sed -i "s/^Version: .*/Version: ${new_version}/" "$BUILD_DIR/DEBIAN/control"

            # Make the two custom builds mutually exclusive and cleanly replace upstream.
            sed -i '/^Conflicts:/d;/^Replaces:/d;/^Provides:/d' "$BUILD_DIR/DEBIAN/control"
            {
              echo "Conflicts: wps-office, ${conflicts}"
              echo "Replaces: wps-office, ${conflicts}"
              echo "Provides: wps-office"
            } >> "$BUILD_DIR/DEBIAN/control"

            out="output/${new_package}_${new_version}_${orig_arch:-amd64}.deb"
            dpkg-deb --build "$BUILD_DIR" "$out"
            dpkg-deb -I "$out" >/dev/null || { echo "::error::built package failed integrity check: $out"; exit 1; }
            echo "Built: $out"
          }

          # full: keeps CEF (modern web home, no popup)
          build_variant full "1" "custom"      "wps-office-custom-lite"
          # lite: no CEF (lean, classic UI)
          build_variant lite "0" "custom-lite" "wps-office-custom"

          echo "Artifacts:"
          ls -lh output/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wps-office-custom-debs
          path: output/*.deb
          if-no-files-found: error

      - name: Determine release tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=build-$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: github.ref_type == 'tag' || inputs.release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.tag.outputs.tag }}" \
            output/*.deb \
            --repo "${{ github.repository }}" \
            --title "WPS Office Custom (${{ steps.tag.outputs.tag }})" \
            --notes "English-only, telemetry-free, offline-hardened WPS Office. Two builds (install ONE):

          - **wps-office-custom** - keeps the embedded browser (CEF): modern web home page, no popups. Larger (~+190 MB).
          - **wps-office-custom-lite** - no CEF: lean, classic UI; web home/templates/account panels removed, fusion loader neutralized.

          Both: telemetry/cloud add-ons removed, /etc/hosts.wps-block network blocklist shipped, and bundled fonts installed. See CLEANING_MAP.md."
